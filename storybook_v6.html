<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>毛豆噗噗</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="turn.min.js"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #2c2c2c;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Noto Sans TC', sans-serif;
  }

  #book-container {
    position: relative;
    width: 900px;
    height: 500px;
  }

  #book {
    width: 900px;
    height: 500px;
  }

  .page {
    position: relative;
    overflow: hidden;
    background: #fff;
  }

  .page img.bg {
    width: 100%;
    height: 100%;
    object-fit: fill;
    display: block;
  }

  .nav-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    font-size: 28px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    cursor: pointer;
    z-index: 100;
    transition: background 0.2s;
  }
  .nav-btn:hover { background: rgba(255,255,255,0.4); }
  #btn-prev { left: -60px; }
  #btn-next { right: -60px; }

  #page-num {
    margin-top: 14px;
    color: #aaa;
    font-size: 13px;
  }

  /* ====== 動畫（從最新 storybook.html 保留）====== */

  @keyframes truckShake {
    0%   { transform: translateX(0)    translateY(0); }
    10%  { transform: translateX(-2px) translateY(-1px); }
    20%  { transform: translateX(2px)  translateY(1px); }
    30%  { transform: translateX(-3px) translateY(-2px); }
    40%  { transform: translateX(3px)  translateY(2px); }
    50%  { transform: translateX(-2px) translateY(-1px); }
    60%  { transform: translateX(2px)  translateY(1px); }
    70%  { transform: translateX(-3px) translateY(-2px); }
    80%  { transform: translateX(3px)  translateY(2px); }
    90%  { transform: translateX(-1px) translateY(-1px); }
    100% { transform: translateX(0)    translateY(0); }
  }

  @keyframes smokeLeft {
    0%   { transform: translate(0, 0);         opacity: 1; }
    100% { transform: translate(-30px, -50px); opacity: 0; }
  }

 @keyframes smokeRight {
  0%   { opacity: 0; transform: translate(0, 0); }
  30%  { opacity: 1; transform: translate(10px, -15px); }
  100% { opacity: 0; transform: translate(30px, -50px); }
 }
 @keyframes smokeFadeInOut {
  0%   { opacity: 0; transform: translate(0, 0); }
  40%  { opacity: 1; transform: translate(-8px, -10px); }
  100% { opacity: 0; transform: translate(-20px, -25px); }
 }

  @keyframes birdHop {
    0%   { transform: translate(0, 0); }
    30%  { transform: translate(var(--dx), -12px); }
    60%  { transform: translate(var(--dx), -4px); }
    80%  { transform: translate(var(--dx), -8px); }
    100% { transform: translate(0, 0); }
  }

  @keyframes seederShake {
    0%   { transform: translateY(0); }
    5%   { transform: translateY(-2px); }
    10%  { transform: translateY(2px); }
    15%  { transform: translateY(-2px); }
    20%  { transform: translateY(2px); }
    25%  { transform: translateY(-2px); }
    30%  { transform: translateY(2px); }
    35%  { transform: translateY(-2px); }
    40%  { transform: translateY(2px); }
    45%  { transform: translateY(-2px); }
    50%  { transform: translateY(2px); }
    55%  { transform: translateY(-2px); }
    60%  { transform: translateY(2px); }
    65%  { transform: translateY(-2px); }
    70%  { transform: translateY(2px); }
    75%  { transform: translateY(-2px); }
    80%  { transform: translateY(2px); }
    85%  { transform: translateY(-2px); }
    90%  { transform: translateY(2px); }
    95%  { transform: translateY(-1px); }
    100% { transform: translateY(0); }
  }
  /* 雲朵上下晃動（吹風感）*/
@keyframes cloudFloat {
  0%   { transform: translateY(0); }
  25%  { transform: translateY(-6px); }
  50%  { transform: translateY(0); }
  75%  { transform: translateY(-4px); }
  100% { transform: translateY(0); }
}

/* 雨滴由上往下 fade in */
@keyframes rainFadeIn {
  0%   { opacity: 0; transform: translateY(-10px); }
  100% { opacity: 1; transform: translateY(0); }
}

/* 植物左右晃動 */
@keyframes plantSway {
  0%   { transform: rotate(0deg); }
  20%  { transform: rotate(-3deg); }
  40%  { transform: rotate(3deg); }
  60%  { transform: rotate(-2deg); }
  80%  { transform: rotate(2deg); }
  100% { transform: rotate(0deg); }
}
/* 太陽上下擺動 + 左右旋轉 */

/* 外層：上下移動 */
@keyframes sunMove {
  0%   { transform: translateY(0); }
  25%  { transform: translateY(-6px); }
  50%  { transform: translateY(0); }
  75%  { transform: translateY(-4px); }
  100% { transform: translateY(0); }
}

/* 內層：原地旋轉 */
@keyframes sunRotate {
  0%   { transform: rotate(0deg); }
  50%  { transform: rotate(8deg); }
  100% { transform: rotate(0deg); }
}

/* 閃亮忽明忽滅 */
@keyframes shine {
  0%   { opacity: 0; transform: scale(0.8); }
  50%  { opacity: 1; transform: scale(1.2); }
  100% { opacity: 0; transform: scale(0.8); }
}

/* 左邊葉子逆時針擺動（來回兩次，非線性）*/
@keyframes leafLeft {
  0%   { transform: rotate(0deg); }
  15%  { transform: rotate(-15deg); }
  30%  { transform: rotate(0deg); }
  45%  { transform: rotate(-10deg); }
  60%  { transform: rotate(0deg); }
  75%  { transform: rotate(-5deg); }
  100% { transform: rotate(0deg); }
}

/* 右邊葉子順時針擺動（來回兩次，非線性）*/
@keyframes leafRight {
  0%   { transform: rotate(0deg); }
  15%  { transform: rotate(15deg); }
  30%  { transform: rotate(0deg); }
  45%  { transform: rotate(10deg); }
  60%  { transform: rotate(0deg); }
  75%  { transform: rotate(5deg); }
  100% { transform: rotate(0deg); }
}

/* 花朵上下擺動 */
@keyframes flowerSway {
  0%   { transform: translateY(0); }
  50%  { transform: translateY(-3px); }
  100% { transform: translateY(0); }
}

/* 植物 6-4 快速上下震動 */
@keyframes plantVibrate {
  0%   { transform: translateY(0); }
  20%  { transform: translateY(-1px); }
  40%  { transform: translateY(1px); }
  60%  { transform: translateY(-1px); }
  80%  { transform: translateY(1px); }
  100% { transform: translateY(0); }
}

/* 月亮慢慢上下移動 */
@keyframes moonFloat {
  0%   { transform: translateY(0); }
  25%  { transform: translateY(-12px); }
  50%  { transform: translateY(0); }
  75%  { transform: translateY(-12px); }
  100% { transform: translateY(0); }
}

/* 星星忽明忽滅 */
@keyframes starTwinkle {
  0%   { opacity: 0.2; transform: scale(0.9); }
  50%  { opacity: 1;   transform: scale(1.1); }
  100% { opacity: 0.2; transform: scale(0.9); }
}

/* 手機版：自動縮放書本 */
@media (max-width: 960px) {
  body {
    padding: 10px;
  }

  #book-container {
    transform-origin: top center;
    transform: scale(calc(100vw / 960px));
    margin-bottom: calc((500px * (100vw / 960px)) - 500px);
  }
}

</style>
</head>

<script>
  // 預先載入所有音效
const audioFiles = {
  truck: new Audio('audio/03_truck.mp3'),
  birds: new Audio('audio/05_birds.mp3'),
  seeder: new Audio('audio/05_truck.mp3'),
};
audioFiles.truck.load();
audioFiles.birds.load();
audioFiles.seeder.load();


// ====== 初始化 turn.js（v2 模式）======
$(document).ready(function() {
  $('#book').turn({
    width: 900,
    height: 500,
    autoCenter: true,
    gradients: true,
    acceleration: true,
    display: 'single',
    when: {
      turned: function(e, page) {
        document.getElementById('page-num').textContent = page + ' / 4';
      }
    }
  });

  $('#btn-prev').click(function() { $('#book').turn('previous'); });
  $('#btn-next').click(function() { $('#book').turn('next'); });
});

// ====== 曳引機互動 ======
let smokeTimer;

function truckInteract() {
  audioFiles.truck.currentTime = 0;
  audioFiles.truck.play();
  const truck = document.getElementById('truck');
  truck.style.animation = 'none';
  void truck.offsetWidth;
  truck.style.animation = 'truckShake 0.6s ease 4';
  setTimeout(() => truck.style.animation = '', 2400);

  for(let i = 1; i <= 5; i++) {
    const smoke = document.getElementById('smoke-' + i);
    smoke.style.animation = 'none';
    smoke.style.opacity = '1';
    void smoke.offsetWidth;
  }
 // 煙霧 4 到 1 依序 fade in 再 fade out（從右到左）
// 第一遍：smoke 4→1 依序出現
const smokeDelays = { 4: 0, 3: 250, 2: 500, 1: 750 };
// 第二遍：間隔 1600ms 後再跑一次
const smokeDelays2 = { 4: 1200, 3: 1450, 2: 1700, 1: 1950 };

for(let i = 4; i >= 1; i--) {
  const smoke = document.getElementById('smoke-' + i);
  smoke.style.animation = 'none';
  smoke.style.opacity = '0';
  void smoke.offsetWidth;

  // 第一遍
  setTimeout(() => {
    smoke.style.animation = 'smokeFadeInOut 0.9s ease forwards';
  }, smokeDelays[i]);

  // 第二遍
  setTimeout(() => {
    smoke.style.animation = 'none';
    smoke.style.opacity = '0';
    void smoke.offsetWidth;
    smoke.style.animation = 'smokeFadeInOut 0.9s ease forwards';
  }, smokeDelays2[i]);
}

// 煙霧 5 往右上飄，跑兩遍
const smoke5 = document.getElementById('smoke-5');
smoke5.style.animation = 'none';
smoke5.style.opacity = '1';
void smoke5.offsetWidth;
smoke5.style.opacity = '0';
void smoke5.offsetWidth;

// 第一遍
smoke5.style.animation = 'smokeRight 1.2s ease forwards';

// 第二遍：等第一遍結束後重置再播
setTimeout(() => {
  smoke5.style.animation = 'none';
  smoke5.style.opacity = '0';
  void smoke5.offsetWidth;
  smoke5.style.animation = 'smokeRight 1.2s ease forwards';
}, 1500);

  clearTimeout(smokeTimer);
  smokeTimer = setTimeout(() => {
    for(let i = 1; i <= 5; i++) {
      const smoke = document.getElementById('smoke-' + i);
      smoke.style.animation = 'none';
      smoke.style.opacity = '0';
      void smoke.offsetWidth;
      smoke.style.transition = 'opacity 1.5s';
      smoke.style.opacity = '1';
      setTimeout(() => smoke.style.transition = '', 1500);
    }
  }, 3200);
}

// ====== 白鷺鷥互動 ======
function birdInteract() {
  audioFiles.birds.currentTime = 0;
  audioFiles.birds.play();
  document.querySelectorAll('.bird').forEach(bird => {
    const delay = Math.random() * 400;
    const distance = (bird.id === 'bird-9' || bird.id === 'bird-8')
                     ? (Math.random() * 8 + 3)
                     : (Math.random() * 15 + 5);
    const forceLeft = bird.dataset.dir === 'left';
    const direction = forceLeft ? -distance : (Math.random() > 0.5 ? distance : -distance);

    setTimeout(() => {
      bird.style.setProperty('--dx', direction + 'px');
      bird.style.animation = 'none';
      void bird.offsetWidth;
      bird.style.animation = `birdHop ${0.6 + Math.random() * 0.4}s ease 4`;
      setTimeout(() => bird.style.animation = '', 4000);
    }, delay);
  });
}

document.querySelectorAll('.bird').forEach(bird => {
  bird.addEventListener('click', birdInteract);
});

// ====== 播種機互動 ======
function seederInteract() {
  audioFiles.seeder.currentTime = 0;
  audioFiles.seeder.play();
  const seeder = document.getElementById('seeder');
  seeder.style.animation = 'none';
  void seeder.offsetWidth;
  seeder.style.animation = 'seederShake 1s ease 3';
  setTimeout(() => seeder.style.animation = '', 3000);
}
// ====== 雲雨植物互動 ======
let weatherTimer;

function weatherInteract() {
  // 雲朵上下晃動
  const cloud = document.getElementById('cloud');
  cloud.style.animation = 'none';
  void cloud.offsetWidth;

  const shineData = [

      }, 1200);;
    }, delay);
  });
}
