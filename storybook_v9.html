  @keyframes rainFadeIn {

    body { padding: 10px; }
    #book-container {
      transform-origin: top center;
      transform: scale(calc(100vw / 960px));

<script>
// 預先載入所有音效
const audioFiles = {
  truck: new Audio('audio/03_truck.mp3'),
  birds: new Audio('audio/05_birds.mp3'),
  seeder: new Audio('audio/05_truck.mp3'),
  nextPage: new Audio('audio/next_page.mp3'),
  prevPage: new Audio('audio/previous_page.mp3'),
  cloud: new Audio('audio/07_cloud.mp3'),
  sun: new Audio('audio/07_sun.mp3'),
  plant5: new Audio('audio/07_plant-5.mp3'),
  moon: new Audio('audio/07_moon.mp3'),

};
audioFiles.truck.load();
audioFiles.birds.load();
audioFiles.seeder.load();
audioFiles.nextPage.load();
audioFiles.prevPage.load();
audioFiles.cloud.load();
audioFiles.sun.load();
audioFiles.plant5.load();
audioFiles.moon.load();


// ====== 初始化 turn.js ======
$(document).ready(function() {
  $('#book').turn({
    width: 900,
    height: 500,
    autoCenter: true,
    gradients: true,
    acceleration: true,
    display: 'single',
    when: {
      turned: function(e, page) {
        document.getElementById('page-num').textContent = page + ' / 4';
      }
    }
  });

  $('#btn-prev').click(function() {
    audioFiles.prevPage.currentTime = 0;
    audioFiles.prevPage.play();
    $('#book').turn('previous');
  });
  $('#btn-next').click(function() {

// ====== 曳引機互動 ======
let smokeTimer;

function truckInteract() {
  audioFiles.truck.currentTime = 0;
  audioFiles.truck.play();

  const truck = document.getElementById('truck');
  const truckGroup = document.getElementById('truck-group');

  // 曳引機原地震動
  truck.style.animation = 'none';
  void truck.offsetWidth;
  truck.style.animation = 'truckDrive 3s linear';
  setTimeout(() => truck.style.animation = '', 3000);

  // 煙霧重置
  for(let i = 1; i <= 5; i++) {
    const smoke = document.getElementById('smoke-' + i);
    smoke.style.animation = 'none';
    smoke.style.opacity = '1';
    void smoke.offsetWidth;
  }

  // 煙霧 4→1 依序 fade in fade out（兩遍）
  const smokeDelays  = { 4: 0,    3: 250,  2: 500,  1: 750  };
  const smokeDelays2 = { 4: 1200, 3: 1450, 2: 1700, 1: 1950 };

  for(let i = 4; i >= 1; i--) {
    const smoke = document.getElementById('smoke-' + i);
    smoke.style.animation = 'none';
    smoke.style.opacity = '0';
    void smoke.offsetWidth;

    // 第一遍
    setTimeout(() => {
      smoke.style.animation = 'smokeFadeInOut 0.9s ease forwards';
    }, smokeDelays[i]);

    // 第二遍
    setTimeout(() => {
      smoke.style.animation = 'none';
      smoke.style.opacity = '0';
      void smoke.offsetWidth;
      smoke.style.animation = 'smokeFadeInOut 0.9s ease forwards';
    }, smokeDelays2[i]);
  }

  // 煙霧 5 往右上飄（兩遍）
  const smoke5 = document.getElementById('smoke-5');
  smoke5.style.transition = 'none';
  smoke5.style.animation = 'none';
  smoke5.style.opacity = '0';
  smoke5.style.transform = 'translate(0, 0)';
  void smoke5.offsetWidth;
  void smoke5.offsetWidth;
  smoke5.style.animation = 'smokeRight 1.2s ease forwards';

  setTimeout(() => {
    smoke5.style.animation = 'none';
    smoke5.style.opacity = '0';
    void smoke5.offsetWidth;
    smoke5.style.animation = 'smokeRight 1.2s ease forwards';
  }, 1500);

  // 煙霧淡回來
  clearTimeout(smokeTimer);
  smokeTimer = setTimeout(() => {
    for(let i = 1; i <= 5; i++) {
      const smoke = document.getElementById('smoke-' + i);
      smoke.style.animation = 'none';
      smoke.style.opacity = '0';
      void smoke.offsetWidth;
      smoke.style.transition = 'opacity 1.5s';
      smoke.style.opacity = '1';
      setTimeout(() => smoke.style.transition = '', 1500);
    }
  }, 3200);
}

// ====== 白鷺鷥互動 ======
function birdInteract() {
  audioFiles.birds.currentTime = 0;
  audioFiles.birds.play();
  document.querySelectorAll('.bird').forEach(bird => {
    const delay = Math.random() * 400;
    const distance = (bird.id === 'bird-9' || bird.id === 'bird-8')
                     ? (Math.random() * 8 + 3)
                     : (Math.random() * 15 + 5);
    const forceLeft = bird.dataset.dir === 'left';
    const direction = forceLeft ? -distance : (Math.random() > 0.5 ? distance : -distance);

    setTimeout(() => {
      bird.style.setProperty('--dx', direction + 'px');
      bird.style.animation = 'none';
      void bird.offsetWidth;
      bird.style.animation = `birdHop ${0.6 + Math.random() * 0.4}s ease 4`;
      setTimeout(() => bird.style.animation = '', 4000);
    }, delay);
  });
}

document.querySelectorAll('.bird').forEach(bird => {
  bird.addEventListener('click', birdInteract);
});

let seederAnimating = false;

function seederInteract() {
  if(seederAnimating) return;

  audioFiles.seeder.currentTime = 0;
  audioFiles.seeder.play();
  const seeder = document.getElementById('seeder');
  seeder.style.animation = 'none';
  void seeder.offsetWidth;

  // 3 秒後慢慢滑回原位
setTimeout(() => {
  // 先把目前位置固定住，再清掉動畫
  seeder.style.transition = 'none';
  seeder.style.transform = 'translateX(20px)';
  seeder.style.animation = 'none';

}
